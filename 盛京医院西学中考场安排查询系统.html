        <div class="result-row"><div class="result-label">座位号</div><div class="result-value"><span style="background:#e0f0f0; padding:4px 14px; border-radius:30px;">${student.seat}</span></div></div>
        <div class="result-row"><div class="result-label">备注</div><div class="result-value">请携带有效证件，提前20分钟入场</div></div>
    `;
}

function search() {
    const name = nameInput.value.trim();
    const empid = empidInput.value.trim();
    
    if (!name || !empid) {
        resultArea.style.display = 'block';
        resultArea.className = 'result not-found';
        resultArea.innerHTML = `<div class="result-title">📛 信息不完整</div><div>请同时填写姓名和员工号。</div>`;
        return;
    }
    
    const key = `${name}|${empid}`;
    const found = studentMap.get(key);
    showResult(found || null);
}

searchBtn.addEventListener('click', search);
[nameInput, empidInput].forEach(input => {
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') search();
    });
});
</script>
</body>
</html>
